<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>squared2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #051e06;
      }
      .canvas-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
      }
      .edit-panel {
        position: absolute;
        display: none;
        box-sizing: border-box;
        background: transparent;
        z-index: 3;
      }
      .edit-panel canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }
      body.editing .edit-panel {
        display: block;
      }
      #tools-panel {
        left: calc((var(--grid-origin-x) - var(--dot-spacing) - var(--panel-width)) * 1px);
        top: calc(var(--grid-origin-y) * 1px);
        width: calc(var(--panel-width) * 1px);
        height: calc(var(--grid-size) * 1px);
      }
      #options-panel {
        left: calc((var(--grid-origin-x) + var(--grid-size) + var(--dot-spacing)) * 1px);
        top: calc(var(--grid-origin-y) * 1px);
        width: calc(var(--panel-width) * 1px);
        height: calc(var(--grid-size) * 1px);
      }
      @media (max-width: 700px) {
        #tools-panel {
          left: calc(var(--grid-origin-x) * 1px);
          top: calc((var(--grid-origin-y) - var(--dot-spacing) - var(--panel-width)) * 1px);
          width: calc(var(--grid-size) * 1px);
          height: calc(var(--panel-width) * 1px);
        }
        #options-panel {
          left: calc(var(--grid-origin-x) * 1px);
          top: calc((var(--grid-origin-y) + var(--grid-size) + var(--dot-spacing)) * 1px);
          width: calc(var(--grid-size) * 1px);
          height: calc(var(--panel-width) * 1px);
        }
      }
    </style>
  </head>
  <body>
    <script src="/dist/main.js"></script>
  </body>
</html>
